<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - DevBox</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #050507;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .login-box {
      background: #0d0d12;
      padding: 30px;
      border-radius: 16px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 30px rgba(168,85,247,0.2);
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .erro {
      color: red;
      font-size: 13px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Entrar</h2>

  <input type="text" id="user" placeholder="Usuário">
  <input type="password" id="pass" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <div class="erro" id="erro"></div>
</div>

<script>
  const USERS_KEY = "devfox_users";
  const LOGGED_KEY = "logado";
  const CURRENT_USER_KEY = "currentUser";

  function getUsers() {
    const stored = localStorage.getItem(USERS_KEY);
    return stored ? JSON.parse(stored) : [];
  }

  function saveUsers(users) {
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
  }

  function ensureDefaultAdmin() {
    const users = getUsers();
    if (!users.find(user => user.username === "admin")) {
      users.push({ username: "admin", password: "123", role: "admin" });
      saveUsers(users);
    }
  }

  function login() {
    const user = document.getElementById("user").value.trim();
    const pass = document.getElementById("pass").value;
    const users = getUsers();
    const found = users.find(account => account.username === user && account.password === pass);

    if (found) {
      localStorage.setItem(LOGGED_KEY, "true");
      localStorage.setItem(CURRENT_USER_KEY, found.username);
      window.location.href = "index.html";
    } else {
      document.getElementById("erro").innerText = "Login inválido";
    }
  }

  ensureDefaultAdmin();

  if (localStorage.getItem(LOGGED_KEY) === "true") {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
